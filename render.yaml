databases:
  - name: simba-db
    plan: free

services:
  # 1. Backend Service (Node.js)
  - type: web
    name: simba-market-api
    runtime: node
    plan: free
    rootDir: simba-backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: simba-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: simba-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://simba-market-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false # You still need to provide this one manually
      - key: MOMO_MOCK_MODE
        value: "true"
      - key: PORT
        value: "10000"

  # 2. Frontend Service (Static Site)
  - type: web
    name: simba-market-frontend
    runtime: static
    rootDir: simba-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://simba-market-api.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 492199668874-l6m8u4tfpsk9sf5jmhfvhtifh78n6t8c.apps.googleusercontent.com
