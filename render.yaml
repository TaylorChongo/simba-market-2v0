services:
  - type: web
    name: simba-market-api
    runtime: node
    plan: free
    rootDir: simba-backend
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    buildFilter:
      paths:
        - simba-backend/**
        - render.yaml
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://simba-market-web.onrender.com
      - key: GROQ_API_KEY
        sync: false
      - key: MOMO_MOCK_MODE
        value: "true"

  - type: web
    name: simba-market-web
    runtime: static
    rootDir: simba-frontend
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - simba-frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://simba-market-api.onrender.com
