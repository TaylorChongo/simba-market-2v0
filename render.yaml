services:
  # Backend Service (Node.js)
  - type: web
    name: simba-market-api
    runtime: node
    plan: free
    rootDir: simba-backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard to your Supabase Transaction URL
      - key: DIRECT_URL
        sync: false # Set this in Render Dashboard to your Supabase Session/Direct URL
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://simba-market.vercel.app # Update this to your actual Vercel URL
      - key: GROQ_API_KEY
        sync: false 
      - key: MOMO_MOCK_MODE
        value: "true"
      - key: PORT
        value: "10000"
