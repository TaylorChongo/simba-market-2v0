services:
  # 1. Backend Service
  - type: web
    name: simba-market-api
    runtime: node
    plan: free
    rootDir: simba-backend
    buildCommand: npm install && prisma generate && prisma migrate deploy && npm run seed
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false # Set this to your Supabase Transaction URL
      - key: DIRECT_URL
        sync: false # Set this to your Supabase Direct URL
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://simba-market-frontend.onrender.com
      - key: GROQ_API_KEY
        sync: false # Set this to your Groq API Key
      - key: MOMO_MOCK_MODE
        value: "true"
      - key: PORT
        value: "10000"

  # 2. Frontend Service
  - type: static
    name: simba-market-frontend
    runtime: static
    plan: free
    rootDir: simba-frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    headers:
      - key: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://simba-market-api.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 492199668874-l6m8u4tfpsk9sf5jmhfvhtifh78n6t8c.apps.googleusercontent.com
